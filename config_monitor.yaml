# ============================================================
# Looking - 网站监控配置
# 功能一：监控用户提供的网站列表，每天抓取最受欢迎的10条内容
# ============================================================

# 输出目录（相对路径，相对于项目根目录）
output:
  directory: output/monitor
  format: both  # json | markdown | both

# 网站列表（添加你要监控的网站）
sites:
  # --- 示例站点（请删除或替换为真实站点）---
  # - name: "Example Site"
  #   url: "https://example.com/news"
  #   login_url: "https://example.com/login"
  #   username: "your_username"
  #   password: "your_password"
  #   username_field: "username"        # 表单用户名 input 的 name 属性
  #   password_field: "password"         # 表单密码 input 的 name 属性
  #   submit_button: "login"            # 提交按钮的 name 属性（可选）
  #   # 文章列表选择器：CSS 选择器，匹配每个文章条目（优先）
  #   article_list_selector: "a.article-title, .news-item a"
  #   # 如果 article_list_selector 不匹配，降级用这两个选择器
  #   article_link_selector: "a[href]"
  #   article_title_selector: "h2, h3, .title"
  #   max_items: 10

  # --- 添加你的真实站点配置 ---
